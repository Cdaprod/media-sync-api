<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ferrofluid Loader</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;background:#000}
  canvas{display:block;width:100%;height:100%}
  #label{
    position:fixed;
    top:51%;
    left:50%;
    transform:translateX(-50%);
    font:600 16px/1 'SF Mono','Fira Code','Courier New',monospace;
    letter-spacing:.22em;
    text-transform:uppercase;
    pointer-events:none;
    user-select:none;
    transition:color .6s ease;
    will-change:transform,color;
    /*backdrop-filter:blur(6px) saturate(.9);
    -webkit-backdrop-filter:blur(6px) saturate(.9);*/
    mix-blend-mode:difference;
    -webkit-text-stroke: .7px rgba(0,0,0,.60);

    text-shadow:
      0 0 2px rgba(0,0,0,.95),
      0 0 7px rgba(0,0,0,.72),
      0 0 10px currentColor,
      0 0 22px currentColor;

  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="label">initializing</div>

<script>
const VERT = `
attribute vec2 a_pos;
void main(){ gl_Position = vec4(a_pos,0.,1.); }
`;

const FRAG = `
precision highp float;

uniform vec2  u_res;
uniform float u_time;
uniform float u_mix;
uniform float u_splat;
uniform float u_rot;
uniform float u_energy;

#define STEPS 80
#define EPS   0.0026
#define FAR   5.5

float smin(float a,float b,float k){
  float h=clamp(.5+.5*(b-a)/k,0.,1.);
  return mix(b,a,h)-k*h*(1.-h);
}
mat3 rotY(float a){float c=cos(a),s=sin(a);return mat3(c,0,s,0,1,0,-s,0,c);}
mat3 rotX(float a){float c=cos(a),s=sin(a);return mat3(1,0,0,0,c,-s,0,s,c);}

float h11(float p){ return fract(sin(p*127.1)*43758.5453); }
vec3  h33(vec3  p){
  p = fract(p*vec3(443.897,441.423,437.195));
  p += dot(p,p.yxz+19.19);
  return fract((p.xxy+p.yxx)*p.zyx);
}

float vnoise(vec3 p){
  vec3 i=floor(p), f=fract(p);
  f = f*f*(3.-2.*f);
  float v=0.;
  for(int dz=0;dz<2;dz++)
  for(int dy=0;dy<2;dy++)
  for(int dx=0;dx<2;dx++){
    vec3 o=vec3(dx,dy,dz);
    float h=h33(i+o).x;
    vec3  w=(1.-f)+vec3(dx,dy,dz)*(2.*f-1.);
    v += h*w.x*w.y*w.z;
  }
  return v;
}

float fbm(vec3 p, int oct){
  float v=0.,a=.5,s=0.;
  for(int i=0;i<5;i++){
    if(i>=oct)break;
    v+=a*vnoise(p); p=p*2.07+vec3(5.1,3.7,2.9); s+=a; a*=.5;
  }
  return v/s;
}

float sdSph(vec3 p,float r){return length(p)-r;}

// Domain-warped FBM — warps the sample point by another fbm before sampling.
// This is what creates the folded, self-similar surface of ferrofluid.
float warpedFbm(vec3 p, int oct){
  // first pass: get a warp offset
  vec3 warp = vec3(
    fbm(p + vec3(0.0, 0.0, 0.0), 2),
    fbm(p + vec3(5.2, 1.3, 2.8), 2),
    fbm(p + vec3(1.7, 9.2, 3.4), 2)
  );
  // second pass: sample at warped position
  return fbm(p + 0.9*warp, oct);
}

float map(vec3 p){
  float t = u_time;

  // ── global tumble — always on, energy speeds it up ──────────────────
  float tspd = 1.0 + u_energy * 2.5;
  p = rotY(u_rot + .12*sin(t*.21*tspd)) * rotX(.09*cos(t*.17*tspd)) * p;

  // ── continuous domain-warped noise — NO mx in geometry at all ───────
  // The blob always exists at full size. State only changes color.
  // Base scroll speed is always active; energy accelerates it.
  float spd = 0.8 + u_energy * 2.8;

  vec3 pSlow = p * 1.5 + vec3(t*.044, -t*.038, t*.032) * spd;
  vec3 pFast = p * 3.4 + vec3(-t*.026, t*.033, -t*.023) * spd;

  float wSlow = warpedFbm(pSlow, 4);
  float wFast = fbm(pFast, 3);

  // Fixed amplitude — never shrinks to zero
  float disp = wSlow * .60 + wFast * .08;
  // Energy briefly swells the surface (adds drama mid-transition)
  disp *= 1.0 + u_energy * .45;

  // ── core — fixed size ────────────────────────────────────────────────
  float d = sdSph(p, .32) + disp * .70;

  // ── 10 lump blobs — fixed positions, only their drift speed changes ──
  for(int i=0;i<10;i++){
    float fi = float(i);
    // Drift at different rates so the mass constantly reshuffles
    float driftSpd = (.022 + fi*.003) * (0.6 + u_energy*1.8);
    float ang  = fi * 2.39996 + t * driftSpd;
    float elev = fi * .30 - 1.50 + t * (.013 + fi*.002) * (0.6 + u_energy*1.5);

    float rr = .22 * (1. + .20*sin(fi*2.3 + t*.07*(0.5+u_energy)));

    vec3 lp = vec3(
      rr*cos(ang)*cos(elev),
      rr*sin(elev),
      rr*sin(ang)*cos(elev)
    );

    float lr = .22 * (.7 + .3*abs(cos(elev))) * (.75 + .25*sin(fi*3.1 + t*.14));
    float ld = sdSph(p - lp, lr) + disp * .38;
    d = smin(d, ld, .25);
  }

  // ── satellite droplets — always present, orbit continuously ─────────
  for(int i=0;i<5;i++){
    float fi = float(i);
    float orbitSpd = (.055 + fi*.006) * (0.7 + u_energy*1.2);
    float ang  = fi*1.2566 + t*orbitSpd;
    float elev = fi*.40 - 1.0 + t*(.020 + fi*.003);
    float dr   = .80 + .06*sin(t*(.25+fi*.04)+fi*1.5);

    vec3 dp = vec3(
      dr*cos(ang)*cos(elev),
      dr*sin(elev),
      dr*sin(ang)*cos(elev)
    );
    float drad = .038 * (.65 + .35*sin(t*(.36+fi*.07)+fi));
    d = smin(d, sdSph(p-dp, drad), .030);
  }

  return d;
}

vec3 calcN(vec3 p){
  vec2 e=vec2(.0015,0.);
  return normalize(vec3(
    map(p+e.xyy)-map(p-e.xyy),
    map(p+e.yxy)-map(p-e.yxy),
    map(p+e.yyx)-map(p-e.yyx)
  ));
}

float ao(vec3 p,vec3 n){
  float o=0.,s=1.;
  for(int i=1;i<=5;i++){
    float h=.045*float(i);
    o+=s*(h-map(p+n*h)); s*=.52;
  }
  return clamp(1.-2.2*o,0.,1.);
}

float march(vec3 ro,vec3 rd,out vec3 hit){
  float t=.05;
  for(int i=0;i<STEPS;i++){
    vec3 p=ro+rd*t;
    float d=map(p);
    if(d<EPS){hit=p;return t;}
    if(t>FAR)break;
    t+=max(d*.76,.0018);
  }
  hit=ro+rd*t; return -1.;
}

float shadow(vec3 ro,vec3 rd){
  float r=1.,t=.02;
  for(int i=0;i<22;i++){
    float h=map(ro+rd*t);
    if(h<.001)return 0.;
    r=min(r,9.*h/t);
    t+=clamp(h,.008,.18);
    if(t>2.8)break;
  }
  return clamp(r,0.,1.);
}

void main(){
  vec2 uv=(gl_FragCoord.xy*2.-u_res)/u_res.y;
  float t=u_time, mx=u_mix;

  vec3 ro=vec3(.06*sin(t*.16),.05*cos(t*.14),3.0);
  vec3 rd=normalize(vec3(uv,-1.90));

  vec3 hit;
  float dist=march(ro,rd,hit);

  // bg — near-black, state tint is pure color (no geometry change)
  vec3 bgA=vec3(.016,.006,.030);
  vec3 bgB=vec3(.006,.020,.022);
  vec3 bg=mix(bgA,bgB,mx);

  // volumetric glow halo — always present, swells with energy
  float gd  = map(ro+rd*1.3);
  float glow = exp(-max(gd,0.)*5.5) * (.25 + .50*u_energy);
  vec3 glowA=vec3(.40,.02,.85);
  vec3 glowB=vec3(.00,.70,.75);
  bg += mix(glowA,glowB,mx)*glow;

  if(dist<0.){gl_FragColor=vec4(bg,1.);return;}

  vec3 N=calcN(hit);
  vec3 V=normalize(ro-hit);
  float occ=ao(hit,N);
  float ndv=max(dot(N,V),0.);

  vec3 L1=normalize(vec3(-.50,.78,.85));
  vec3 L2=normalize(vec3( .75,-.12,.55));

  float sh1=shadow(hit+N*.006,L1);
  float ndl1=max(dot(N,L1),0.)*sh1;
  float ndl2=max(dot(N,L2),0.)*.45;

  // Fresnel — fixed exponent, only color changes with state
  float fres=pow(1.-ndv, 3.2);
  float rim =pow(1.-ndv, 1.4);

  vec3 H1=normalize(L1+V);
  float sp1=pow(max(dot(N,H1),0.), 56.);
  vec3 H2=normalize(L2+V);
  float sp2=pow(max(dot(N,H2),0.), 16.);

  // Surface noise for color variation — same regardless of state
  float sn=fbm(hit*4.0+vec3(t*.022,-t*.018,t*.016),3);
  float lit=clamp(ndl1*.65+ndl2*.2+occ*.35+sn*.12,0.,1.);

  // ── color palettes — state A=violet/magenta, state B=cyan/teal ──────
  // Both palettes have similar brightness so no pop-in at crossover
  vec3 mA0=vec3(.05,.00,.12), mA1=vec3(.25,.01,.62), mA2=vec3(.72,.10,.96);
  vec3 mB0=vec3(.00,.07,.09), mB1=vec3(.01,.50,.58), mB2=vec3(.22,.94,.99);

  vec3 matA=mix(mA0, mix(mA1,mA2,lit), lit);
  vec3 matB=mix(mB0, mix(mB1,mB2,lit), lit);
  vec3 mat=mix(matA,matB,mx);

  // emissive & rim colors transition smoothly
  vec3 emA=vec3(.50,.02,.90), emB=vec3(.00,.78,.88);
  vec3 em=mix(emA,emB,mx);

  vec3 rimCA=vec3(.90,.18,.99), rimCB=vec3(.15,.99,.99);
  vec3 rimC=mix(rimCA,rimCB,mx);

  // Key light color tints with state
  vec3 keyA=vec3(.55,.04,.92), keyB=vec3(.04,.82,.92);
  vec3 keyC=mix(keyA,keyB,mx);

  // SSS — thickness estimate, energy slightly brightens it
  float thick=clamp(1.-map(hit-N*.16)/.16, 0.,1.);
  float sssStrength = .24 + .20*u_energy;

  vec3 col=vec3(0.);
  col += mat*(.04+.05*occ);
  col += mat*keyC*ndl1*.80;
  col += mat*vec3(.12,.08,.06)*ndl2;
  col += em*thick*(sssStrength+.28*fres);
  col += rimC*rim*mix(.52,.74,mx)*(.4+.6*occ);
  col += em*fres*.28;
  col += vec3(.92,.88,.99)*sp1*.26;
  col += rimC*sp2*.05;
  col *= .28+.72*occ;

  // Energy makes the whole thing pulse slightly brighter
  col *= 1.0 + u_energy * .30;

  float gr=fract(sin(dot(gl_FragCoord.xy,vec2(127.1,311.7))+t*43.5)*43758.5);
  col += (gr-.5)*.009;

  //gl_FragColor=vec4(col,1.);
  float edgeD = abs(map(hit));
  float edgeAlpha = 1.0 - smoothstep(0.0, 0.010, edgeD);
  vec3 finalCol = mix(bg, col, edgeAlpha);
  gl_FragColor = vec4(finalCol, 1.0);
}
`;

const canvas=document.getElementById('c');
const gl=canvas.getContext('webgl',{alpha:false,antialias:false});
if(!gl){document.body.textContent='WebGL not supported';throw 0;}

function mkS(type,src){
  const s=gl.createShader(type);
  gl.shaderSource(s,src);gl.compileShader(s);
  if(!gl.getShaderParameter(s,gl.COMPILE_STATUS)){console.error(gl.getShaderInfoLog(s));throw new Error('shader');}
  return s;
}
function mkP(vs,fs){
  const p=gl.createProgram();
  gl.attachShader(p,mkS(gl.VERTEX_SHADER,vs));
  gl.attachShader(p,mkS(gl.FRAGMENT_SHADER,fs));
  gl.linkProgram(p);
  if(!gl.getProgramParameter(p,gl.LINK_STATUS)){console.error(gl.getProgramInfoLog(p));throw new Error('link');}
  return p;
}

const prog=mkP(VERT,FRAG);
const buf=gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER,buf);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);

const L={
  aPos  : gl.getAttribLocation(prog,'a_pos'),
  uRes  : gl.getUniformLocation(prog,'u_res'),
  uTime : gl.getUniformLocation(prog,'u_time'),
  uMix  : gl.getUniformLocation(prog,'u_mix'),
  uSplat: gl.getUniformLocation(prog,'u_splat'),
  uRot  : gl.getUniformLocation(prog,'u_rot'),
  uEnergy: gl.getUniformLocation(prog,'u_energy'),
};
gl.enableVertexAttribArray(L.aPos);
gl.vertexAttribPointer(L.aPos,2,gl.FLOAT,false,0,0);
gl.disable(gl.DEPTH_TEST);

const label=document.getElementById('label');
const LBLS=['initializing','loading assets'];
const CLRS=['rgba(160,60,255,A)','rgba(0,200,195,A)'];

let t0       = performance.now();
// Spring state for color mix — position + velocity
let sMix     = 0;
let sVel     = 0;
let sTgt     = 0;
let sLast    = -1;
// Energy: floor + spikes on transition
let energy   = 0.35;        // never drops below 0.30
let energyTgt= 0.35;
// Rotation spring
let rotCur   = 0;
let rotVel   = 0;
let rotTgt   = 0;

function resize(){
  const dpr=Math.min(window.devicePixelRatio||1,1.5);
  canvas.width=Math.round(canvas.clientWidth*dpr);
  canvas.height=Math.round(canvas.clientHeight*dpr);
  gl.viewport(0,0,canvas.width,canvas.height);
}
window.addEventListener('resize',resize,{passive:true});
resize();

function frame(now){
  const t=(now-t0)*.001;

  // ── Continuous sine-driven state ─────────────────────────────────────
  // sMix target oscillates as a slow sine — never hard-flips to 0 or 1,
  // so the color always drifts. Period ~14s per full cycle.
  const wave = Math.sin(t * 0.448);           // -1..1 over ~14s
  sTgt = wave * 0.5 + 0.5;                    // remap to 0..1

  // Detect crossing the midpoint — that's the "state change moment"
  const crossed = (sTgt > 0.5) !== (sLast > 0.5);
  if(crossed && sLast !== -1){
    // Inject spring velocity toward new target, spike energy, rotate
    const dir = sTgt > 0.5 ? 1 : -1;
    sVel      += dir * 0.055;
    energyTgt  = 1.0;
    rotTgt    += dir * 0.58;
    rotVel    += dir * 0.020;
  }
  sLast = sTgt;

  // Spring integration — stiff enough to track the sine but with overshoot
  sVel  = sVel  * 0.82 + (sTgt - sMix) * 0.018;
  sMix += sVel;
  const sMixC = Math.max(0, Math.min(1, sMix));

  // Energy: floor at 0.30 always, spike decays back to floor
  energyTgt = Math.max(0.30, energyTgt * 0.962);
  energy    += (energyTgt - energy) * 0.08;

  // Rotation spring
  rotVel  = rotVel  * 0.82 + (rotTgt - rotCur) * 0.011;
  rotCur += rotVel;

  // Label & color — follows sMixC so it feels tied to the visual
  const si  = sMixC > 0.5 ? 1 : 0;
  const alp = (0.75 + .20*Math.sin(t*1.6)).toFixed(2);
  label.textContent = LBLS[si];
  label.style.color = CLRS[si].replace('A', alp);

  gl.clearColor(0,0,0,1);
  gl.clear(gl.COLOR_BUFFER_BIT);
  gl.useProgram(prog);
  gl.bindBuffer(gl.ARRAY_BUFFER,buf);
  gl.enableVertexAttribArray(L.aPos);
  gl.vertexAttribPointer(L.aPos,2,gl.FLOAT,false,0,0);

  gl.uniform2f(L.uRes,    canvas.width, canvas.height);
  gl.uniform1f(L.uTime,   t);
  gl.uniform1f(L.uMix,    sMixC);
  gl.uniform1f(L.uSplat,  0.0);   // no longer needed — energy handles it
  gl.uniform1f(L.uRot,    rotCur);
  gl.uniform1f(L.uEnergy, energy);

  gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

window.blobLoader={
  setStage: s => {
    sTgt = s==='thumbnails' ? 1 : 0;
    const dir = sTgt > 0.5 ? 1 : -1;
    sVel += dir * 0.055;
    energyTgt = 1.0;
    rotTgt += dir * 0.58;
  },
  setProgress:()=>{},
};
</script>

</body>
</html>
